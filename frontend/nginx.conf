server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy — container DNS resolves "backend" to the app service.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # User-uploaded files (avatars) live on the backend container's mounted
    # volume — proxy them through nginx so the browser sees one origin.
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown routes hit index.html so react-router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching (vite emits hashed filenames, safe to cache long).
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
